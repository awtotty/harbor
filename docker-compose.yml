services:
  harbor:
    build:
      context: .
      args:
        HARBOR_VERSION: ${HARBOR_VERSION:-dev}
        HARBOR_COMMIT: ${HARBOR_COMMIT:-unknown}
        HARBOR_BUILT_AT: ${HARBOR_BUILT_AT:-unknown}
    restart: unless-stopped
    ports:
      - "${HARBOR_BIND_HOST:-127.0.0.1}:${HARBOR_PORT:-8080}:8080"
    environment:
      HARBOR_PASSWORD: ${HARBOR_PASSWORD:-harbor}
      HARBOR_PRODUCTION: ${HARBOR_PRODUCTION:-false}
      HARBOR_CONFIG_DIR: /config
      HARBOR_WORKSPACE_DIR: /workspace
      HARBOR_TERMINAL_USER: agent
      HARBOR_DEV_PROXY_PORTS: ${HARBOR_DEV_PROXY_PORTS:-3000-3099,5173}
      HARBOR_UPDATER_URL: ${HARBOR_UPDATER_URL:-http://harbor-updater:8787}
      HARBOR_UPDATER_TOKEN: ${HARBOR_UPDATER_TOKEN:-}
      PI_CODING_AGENT_DIR: /config/pi-agent
      PI_CODING_AGENT_SESSION_DIR: /config/sessions
    volumes:
      - harbor-workspace:/workspace
      - harbor-config:/config
      - harbor-home:/home/agent
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  harbor-updater:
    profiles: ["updater"]
    build:
      context: .
      dockerfile: Dockerfile.updater
    restart: unless-stopped
    environment:
      HARBOR_UPDATER_TOKEN: ${HARBOR_UPDATER_TOKEN:-}
      HARBOR_DEPLOY_DIR: /deploy
      COMPOSE_PROJECT_NAME: ${COMPOSE_PROJECT_NAME:-harbor}
    volumes:
      - ./:/deploy
      - /var/run/docker.sock:/var/run/docker.sock

volumes:
  harbor-workspace:
  harbor-config:
  harbor-home:
