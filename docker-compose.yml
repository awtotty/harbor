services:
  harbor:
    build: .
    restart: unless-stopped
    ports:
      - "${HARBOR_BIND_HOST:-127.0.0.1}:${HARBOR_PORT:-8080}:8080"
      - "${HARBOR_SSH_BIND_HOST:-127.0.0.1}:${HARBOR_SSH_PORT:-2222}:22"
      - "${HARBOR_DEV_BIND_HOST:-127.0.0.1}:3000-3099:3000-3099"
    environment:
      HARBOR_PASSWORD: ${HARBOR_PASSWORD:-harbor}
      HARBOR_PRODUCTION: ${HARBOR_PRODUCTION:-false}
      HARBOR_CONFIG_DIR: /config
      HARBOR_WORKSPACE_DIR: /workspace
      HARBOR_TERMINAL_USER: agent
      PI_CODING_AGENT_DIR: /config/pi-agent
      PI_CODING_AGENT_SESSION_DIR: /config/sessions
    volumes:
      - harbor-workspace:/workspace
      - harbor-config:/config
      - harbor-home:/home/agent
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

volumes:
  harbor-workspace:
  harbor-config:
  harbor-home:
